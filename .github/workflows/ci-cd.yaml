name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint
        run: ruff check app/ agent_worker.py

      - name: Test
        run: pytest tests/ -v --tb=short
        env:
          LIVEKIT_URL: ws://localhost:7880
          LIVEKIT_API_KEY: testkey
          LIVEKIT_API_SECRET: testsecret
          OPENAI_API_KEY: sk-test
          DEEPGRAM_API_KEY: test
          CARTESIA_API_KEY: test
          RAG_ENABLED: "false"

  # ── Frontend Build ─────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  # ── Docker Build ───────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push'
    strategy:
      matrix:
        target: [backend-api, backend-agent, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend-api
        if: matrix.target == 'backend-api'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: api
          push: false
          tags: voice-agent/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend-agent
        if: matrix.target == 'backend-agent'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: agent
          push: false
          tags: voice-agent/agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend
        if: matrix.target == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: voice-agent/frontend:latest
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy (main only) ─────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to cluster
        run: |
          echo "Deploy step — configure with your cloud provider"
          # Example: kubectl apply or cloud-specific deploy