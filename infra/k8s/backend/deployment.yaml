apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: voice-agent
  labels:
    app: backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
        - name: backend
          image: voice-agent/backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: voice-agent-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
# Agent Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
  namespace: voice-agent
  labels:
    app: agent-worker
    tier: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: agent-worker
        tier: worker
    spec:
      containers:
        - name: agent
          image: voice-agent/agent:latest
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: voice-agent-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          # Agent workers don't expose HTTP — use process liveness
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os; assert os.path.exists('/proc/1/cmdline')"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      terminationGracePeriodSeconds: 60