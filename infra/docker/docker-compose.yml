# Development docker-compose
version: "3.9"

services:
  # ── LiveKit Server ────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:v1.7
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: devsecret"
    command: --dev --node-ip 127.0.0.1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Qdrant ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ../../backend
      target: api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LIVEKIT_URL: ws://livekit:7880
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Agent Worker ──────────────────────────────────────────
  agent:
    build:
      context: ../../backend
      target: agent
    env_file:
      - .env
    environment:
      LIVEKIT_URL: ws://livekit:7880
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      livekit:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data: