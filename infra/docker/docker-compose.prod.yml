# Production overrides
version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:v1.7
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    deploy:
      resources:
        limits:
          memory: 512M

  qdrant:
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    build:
      context: ../../backend
      target: api
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  agent:
    build:
      context: ../../backend
      target: agent
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  frontend:
    build:
      context: ../../frontend
      args:
        VITE_API_URL: /api
    deploy:
      resources:
        limits:
          memory: 256M